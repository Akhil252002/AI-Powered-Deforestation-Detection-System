<div class="list-container">
    <div class="list-header">Region List</div>
    <table class="list-table">
        <thead>
            <tr>
                <th>Region Name</th>
                <th>Region_Type</th>
            </tr>
        </thead>
        <tbody>
            {% for x in regions %}
            <tr>
                <td>{{ x.id }}</td>
                <td>{{ x.name}}</td>
                <td>{{ x.region_type}}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{% url 'admin_dashboard' %}" class="btn-back">Back to Dashboard</a>
</div>
