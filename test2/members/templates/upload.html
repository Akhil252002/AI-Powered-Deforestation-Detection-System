<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stylish Form</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #e0eafc, #cfdef3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .custom-form {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 100%;
            transition: transform 0.3s ease-in-out;
        }

        .custom-form:hover {
            transform: scale(1.01);
        }

        .custom-form label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333333;
        }

        .custom-form input[type="text"],
        .custom-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .custom-form input[type="text"]:focus,
        .custom-form textarea:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
        }

        .custom-form textarea {
            resize: vertical;
            min-height: 100px;
        }

        .custom-form button {
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        .custom-form button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <form method="post" class="custom-form">
        {% csrf_token %}

        <!-- Region Name Input -->
        <label for="region">Region Name</label>
        <input type="text" name="region" id="region" placeholder="Enter region name" required>

        <!-- Identifications Text Area -->
        <label for="identifications">Identifications</label>
        <textarea name="identifications" id="identifications" placeholder="Enter identifications here" required></textarea>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
