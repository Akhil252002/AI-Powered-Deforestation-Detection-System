<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Region</title>
    <style>
        /* Custom Theme */
        body {
            display: flex;
            background: #f4f3f9;
            color: #333;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #1a1a2e;
            color: white;
            position: fixed;
            padding-top: 20px;
        }
        .sidebar h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #ff9f43;
            font-weight: bold;
        }
        .sidebar a {
            color: white;
            padding: 12px;
            display: block;
            text-decoration: none;
            font-weight: 500;
        }
        .sidebar a:hover {
            background: #444;
            border-left: 5px solid #ff9f43;
        }

        /* Content Area */
        .content {
            margin-left: 260px;
            padding: 20px;
            width: 100%;
        }

        /* Section Headers */
        .section-title {
            font-size: 22px;
            font-weight: bold;
            padding: 10px;
            border-left: 5px solid #ff9f43;
            background: #eaeaea;
            border-radius: 5px;
            display: flex;
            align-items: center;
            margin-top: 20px;
        }
        .section-title i {
            margin-right: 10px;
            color: #ff9f43;
        }

        /* Tables */
        .table {
            background: white;
            color: black;
            border-radius: 10px;
        }
        .table th, .table td {
            border: 1px solid #ddd;
        }

        /* Chart Styling */
        .chart-container {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            height: 350px;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }



        /* Summary Card Styling */
.card {
    padding: 20px;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s ease-in-out;
}

.card:hover {
    transform: scale(1.05);
}

.card h4 {
    font-size: 18px;
    margin-bottom: 5px;
}

.card h3 {
    font-size: 32px;
}

/* Card Colors */
.card-blue { background: #007bff; }       /* Blue - Total Users */
.card-green { background: #28a745; }      /* Green - Images Processed */
.card-red { background: #dc3545; }        /* Red - Deforestation Rate */
.card-orange { background: #ff9f43; }     /* Orange - Threat Alerts */


/* Form Styling */
        .form-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        .btn-custom {
            background: #ff9f43;
            color: white;
            border: none;
            transition: all 0.3s ease-in-out;
        }
        .btn-custom:hover {
            background: #ff7843;
        }
        .dropdown-styled {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        /* Center the form */
form {
    width: 400px;
    margin: 40px auto;
    padding: 20px;
    border-radius: 8px;
    background: #ffffff;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

/* Style labels */
form label {
    display: block;
    font-weight: bold;
    margin-bottom: 8px;
}

/* Style text inputs */
form input[type="text"] {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    margin-bottom: 15px;
}

/* Radio Button Styling */
.radio-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 15px;
}

.radio-group .form-check {
    display: flex;
    align-items: center;
    gap: 10px;
}

.radio-group input[type="radio"] {
    transform: scale(1.2); /* Slightly larger radio button */
    cursor: pointer;
}

.radio-group label {
    font-size: 16px;
    cursor: pointer;
}

/* Button Styling */
form button {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 5px;
    background: #ff9f43;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease-in-out;
}

form button:hover {
    background: #ff7843;
}


    </style>
</head>
<body>
    <h1>Add Region and Town</h1>
    <form method="POST">
        {% csrf_token %}

        <!-- Region Name Input -->
        <label for="region_name"><i class="fas fa-globe"></i> Region Name:</label>
        <input type="text" name="region_name" class="form-control" required>

        <!-- Town Name Input -->
        <label for="town_name"><i class="fas fa-city"></i> Town Name:</label>
        <input type="text" name="town_name" class="form-control" required>

        <!-- Land Type Selection -->

<label>Land Type:</label><br>



<label>

<input type="radio" name="land_type" value="Forest Land" required>

Forest Land

</label><br>



<label>

<input type="radio" name="land_type" value="Way">

Way

</label><br>



<label>

<input type="radio" name="land_type" value="Healthy Forest">

Healthy Forest

</label><br>



<label>

<input type="radio" name="land_type" value="Homes">

Homes

</label><br><br>



<button type="submit">Add Region & Town</button>
    </form>
</div>
</body>
</html>
